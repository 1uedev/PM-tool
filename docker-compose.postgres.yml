services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pmcopilot
      POSTGRES_PASSWORD: pmcopilot
      POSTGRES_DB: pmcopilot_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmcopilot -d pmcopilot_test"]
      interval: 5s
      timeout: 5s
      retries: 12
